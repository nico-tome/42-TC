volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      device: /home/ntome/data/mariadb
      o: bind
      type: none

  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      device: /home/ntome/data/wordpress
      o: bind
      type: none

  adminer:
    name: adminer
    driver: local
    driver_opts:
      device: /home/ntome/data/adminer
      o: bind
      type: none

services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    networks: 
      - inception
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - wordpress
      - adminer
      - static_webpage
    ports:
      - "443:443"
    restart: on-failure

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    networks: 
      - inception
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env
    expose:
      - "9000"
    restart: on-failure

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    networks: 
      - inception
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    expose:
      - "3306"
    restart: on-failure

  ftp:
    container_name: ftp
    build: requirements/bonus/ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - "wordpress:/var/www/html"
    depends_on:
      - wordpress
    env_file:
      - .env
    networks:
      - inception
    restart: on-failure
  
  redis:
    container_name: redis
    build: requirements/bonus/redis
    volumes:
      - "wordpress:/var/www/html"
    networks:
      - inception
    restart: on-failure

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    networks:
      - inception
    depends_on:
      - wordpress
      - mariadb
    volumes:
      - adminer:/var/www/html
    restart: on-failure

  static_webpage:
    build: ./requirements/bonus/static_page
    container_name: static_page
    networks:
      - inception
    ports:
      - "81:81"
    restart: on-failure

networks:
  inception:
    name: inception
    driver: bridge